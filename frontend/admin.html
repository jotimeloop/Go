<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin console — RentiGo</title>
<link rel="stylesheet" href="styles.css">
</head><body>
<script src="data.js"></script>
<script src="auth.js"></script>
<script>if(!Auth.require("admin"))throw new Error("blocked");</script>
<script>
const revenue = BOOKINGS.reduce((s,b)=>s+b.total,0);
const stats = [
  {label:"Total users", value:USERS.filter(u=>u.role==="customer").length, icon:ICON.users, trend:"+12%"},
  {label:"Agencies", value:USERS.filter(u=>u.role==="agency").length, icon:ICON.building, trend:"+3"},
  {label:"Listed vehicles", value:VEHICLES.length, icon:ICON.car, trend:"+8"},
  {label:"Conflicts", value:1, icon:ICON.alert, trend:"−2"},
  {label:"Bookings", value:BOOKINGS.length, icon:ICON.trend, trend:"+18%"},
  {label:"Revenue", value:fmt(revenue), icon:ICON.rupee, trend:"+24%"},
];
const statsHTML = stats.map(s=>`
  <div class="stat">
    <div class="ico" style="width:36px;height:36px">${s.icon}</div>
    <p class="l" style="margin-top:12px">${s.label}</p>
    <p class="v" style="font-size:20px">${s.value}</p>
    <p style="font-size:12px;color:var(--success);font-weight:600;margin:0">${s.trend}</p>
  </div>`).join("");

const usersHTML = `<table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th class="text-right">Action</th></tr></thead><tbody>
  ${USERS.map(u=>`<tr>
    <td style="font-weight:600">${u.name}</td><td class="text-muted">${u.email}</td>
    <td><span class="badge ${u.role==='agency'?'badge-primary':''}">${u.role}</span></td>
    <td class="text-muted">${u.joined}</td>
    <td class="text-right"><button class="btn btn-ghost btn-sm">Manage</button></td>
  </tr>`).join("")}</tbody></table>`;

const listingsHTML = `<div class="fleet-grid">${VEHICLES.slice(0,6).map(v=>`
  <div class="fleet-card">
    <img src="${v.image}" alt="${v.name}">
    <div class="body">
      <p class="text-muted" style="font-size:12px;margin:0">${v.agency}</p>
      <h3 style="font-size:16px;margin:2px 0 12px">${v.brand} ${v.name}</h3>
      <div style="display:flex;gap:8px"><button class="btn btn-primary btn-sm" style="flex:1">Approve</button><button class="btn btn-outline btn-sm" style="flex:1">Reject</button></div>
    </div>
  </div>`).join("")}</div>`;

const allBookingsHTML = `<table><thead><tr><th>ID</th><th>Customer</th><th>Vehicle</th><th>Dates</th><th>Total</th><th>Status</th></tr></thead><tbody>
  ${BOOKINGS.map(b=>`<tr>
    <td style="font-family:monospace;font-size:12px">${b.id}</td><td>${b.customer}</td><td>${b.vehicleName}</td>
    <td class="text-muted">${b.startDate} → ${b.endDate}</td><td>${fmt(b.total)}</td>
    <td><span class="badge">${b.status}</span></td>
  </tr>`).join("")}</tbody></table>`;

const main = `
<div class="container" style="padding:40px 24px">
  <div style="margin-bottom:32px"><h1 style="font-size:32px;margin:0">Admin console</h1><p class="text-muted" style="margin-top:6px">Platform-wide overview and controls</p></div>
  <div class="stats stats-6">${statsHTML}</div>
  <div class="tabs">
    <button data-tab="users" class="active">Users & Agencies</button>
    <button data-tab="listings">Vehicle approvals</button>
    <button data-tab="all">All bookings</button>
  </div>
  <div id="pane-users" class="tab-pane active">${usersHTML}</div>
  <div id="pane-listings" class="tab-pane">${listingsHTML}</div>
  <div id="pane-all" class="tab-pane">${allBookingsHTML}</div>
</div>`;
mountLayout("admin.html", main);

document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));b.classList.add("active");
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  document.getElementById("pane-"+b.dataset.tab).classList.add("active");
}));
</script>
</body></html>
